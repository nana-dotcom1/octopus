<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lil octo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<audio id="heartbeat" src="music.mp3" preload="auto"></audio>

  <!-- OCEAN SCREEN -->
  <div class="ocean-screen" id="oceanScreen">
    <div class="parallax-bg"></div>
    <img src="./assets/octopus.png" class="octo" id="octo" alt="octopus" />
    <div class="parallax-container"></div>
  </div>

  <!-- INTRO SCREEN -->
  <div class="intro-screen" id="introScreen">
    <canvas id="peekholeCanvas"></canvas>
    <div class="intro-content">
      <img src="./assets/pinkinnk.png" class="intro-star" alt="lil octo star" />
      <button id="startBtn" style="display:none;"></button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
